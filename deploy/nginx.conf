# /etc/nginx/sites-available/shieldvase.io
# Serves prebuilt static assets directly, proxies everything else to the Astro Node process.

server {
    listen 443 ssl http2;
    server_name shieldvase.io www.shieldvase.io;

    ssl_certificate     /etc/letsencrypt/live/shieldvase.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shieldvase.io/privkey.pem;

    root /var/www/shieldvase-web/dist/client;
    index index.html;

    # Long-cache static assets
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Try static file first, then fall back to the Astro Node server for SSR/API routes
    location / {
        try_files $uri $uri/index.html @astro;
    }

    location @astro {
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
}

server {
    listen 80;
    server_name shieldvase.io www.shieldvase.io;
    return 301 https://shieldvase.io$request_uri;
}
